services:
  # --- Backend: Express + MongoDB + Google OAuth ---
  - type: web
    name: capstone-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Заполнить ПОСЛЕ первого деплоя фронтенда — реальный URL сайта на Render.
      - key: CLIENT_URL
        sync: false
      # Заполнить ПОСЛЕ первого деплоя бэкенда своим же URL + /auth/google/callback,
      # и добавить его же в Google Cloud Console -> Authorized redirect URIs.
      - key: GOOGLE_CALLBACK_URL
        sync: false

  # --- Frontend: Vite + React (статический сайт) ---
  - type: web
    name: capstone-frontend
    runtime: static
    rootDir: my-app
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # Прячем backend позади домена фронтенда — иначе браузер считает
      # capstone-frontend/capstone-backend разными сайтами (onrender.com
      # в публичном суффиксном списке) и блокирует cross-site session cookie.
      # ВАЖНО: если backend пересоздать и его адрес изменится — поправить URL ниже.
      - type: rewrite
        source: /auth/*
        destination: https://capstone-backend-v768.onrender.com/auth/*
      - type: rewrite
        source: /feedbacks
        destination: https://capstone-backend-v768.onrender.com/feedbacks
      - type: rewrite
        source: /feedbacks/*
        destination: https://capstone-backend-v768.onrender.com/feedbacks/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Указываем на СВОЙ ЖЕ домен (не на backend!) — запросы к /auth/* и
      # /feedbacks/* перехватят rewrite-правила выше и уйдут на backend
      # прозрачно для браузера, сохраняя cookie как first-party.
      - key: VITE_API_URL
        sync: false
